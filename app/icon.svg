<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  
  <!-- Red Outline -->
  <text 
    x="50" 
    y="56" 
    font-family="Arial, sans-serif" 
    font-weight="900" 
    font-style="italic" 
    font-size="78" 
    fill="none" 
    stroke="#DC2626" 
    stroke-width="8" 
    stroke-linejoin="round"
    text-anchor="middle" 
    dominant-baseline="middle"
  >
    X
  </text>

  <!-- Black Fill (drawn on top so the stroke acts as an outer outline) -->
  <text 
    x="50" 
    y="56" 
    font-family="Arial, sans-serif" 
    font-weight="900" 
    font-style="italic" 
    font-size="78" 
    fill="#000000" 
    text-anchor="middle" 
    dominant-baseline="middle"
  >
    X
  </text>
</svg>